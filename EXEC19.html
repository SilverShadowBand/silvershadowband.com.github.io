<!DOCTYPE html>
<html>
<head>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: transparent;
            display: flex; justify-content: center; align-items: center;
        }
        #screamer { max-width: 600px; max-height: 600px; image-rendering: pixelated; }
    </style>
</head>
<body>
    <img id="screamer" src="EXEC1.bmp">
    <audio id="audio" src="EXEC.wav" autoplay loop></audio>
    <script>
        const display = document.getElementById('screamer');
        const img1 = "EXEC1.bmp";
        const img2 = "EXEC2.bmp";
        let toggle = false;
        setInterval(() => {
            display.src = toggle ? img1 : img2;
            toggle = !toggle;
        }, 50);
        window.addEventListener('load', () => {
            document.getElementById('audio').play().catch(() => {});
        });
    </script>
</body>
</html>
