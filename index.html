<!DOCTYPE html>
<html>
<head>
    <title>SILVER SHADOW</title>
    <style>
        /* Forces crisp pixelation on your 16-color GIFs instead of modern blur */
        img {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        /* 90s text blinking animation */
        .retro-blink {
            animation: blinker 1.2s linear infinite;
        }
        @keyframes blinker {
            50% { opacity: 0; }
        }

        /* Floating randomized GIF positions out in the margins */
        .float-gif-left1  { position: absolute; top: 160px; left: 4%; }
        .float-gif-left2  { position: absolute; top: 480px; left: 3%; }
        .float-gif-left3  { position: absolute; top: 780px; left: 4%; }
        .float-gif-right1 { position: absolute; top: 160px; right: 4%; }
        .float-gif-right2 { position: absolute; top: 480px; right: 3%; }
        .float-gif-right3 { position: absolute; top: 780px; right: 4%; }
    </style>
</head>
<body bgcolor="#000000" text="#FF0000" link="#0000FF" vlink="#800080" alink="#FF00FF">

    <!-- UPPERCASE MARGIN GRAPHICS (Symmetric left and right columns) -->
    <div class="float-gif-left1"><img src="IMG1.gif" alt="[X]" width="90"></div>
    <div class="float-gif-left2"><img src="IMG2.gif" alt="[X]" width="90"></div>
    <div class="float-gif-left3"><img src="IMG3.gif" alt="[X]" width="90"></div>
    
    <div class="float-gif-right1"><img src="IMG4.gif" alt="[X]" width="90"></div>
    <div class="float-gif-right2"><img src="IMG5.gif" alt="[X]" width="90"></div>
    <div class="float-gif-right3"><img src="IMG6.gif" alt="[X]" width="90"></div>

    <center>
        <br><br>
        
        <!-- THE LOGO TITLE -->
        <h1>
            <font face="Times New Roman, Times, serif" color="#FF0000" size="7">
                <b>SILVER SHADOW</b>
            </font>
        </h1>

        <!-- THE UNDER CONSTRUCTION NOTICE -->
        <font face="Courier New, Courier, monospace" color="#0000FF" size="3">
            <b>::: UNDER CONSTRUCTION :::</b>
        </font>
        <br><br><br>

        <!-- YOUR LYRIC MARQUEE TICKER -->
        <table border="2" bordercolor="#0000FF" bgcolor="#000000" width="85%" cellpadding="4">
            <tr>
                <td>
                    <marquee scrollamount="5" direction="left">
                        <font face="Courier New, Courier, monospace" color="#800080" size="4">
                            <b>CEASE TO BELEIVE IN ALL ETERNITY - CONSCIOUSNESS EXISTS WITHOUT AN ENTITY... COMING SOON...</b>
                        </font>
                    </marquee>
                </td>
            </tr>
        </table>

        <br><br><br>

        <!-- MAIN BOXY BLOCK -->
        <table border="6" bordercolor="#FF0000" bgcolor="#000022" cellpadding="20" width="50%">
            <tr>
                <td align="center">
                    
                    <font face="Times New Roman, Times, serif" color="#800080" size="6" class="retro-blink">
                        <b>COMING SOON</b>
                    </font>
                    
                    <br><br><br>

                    <!-- BITCRUSHED TAPE PLAYER CORE -->
                    <audio id="metaltrack" loop>
                        <source src="track1.mp3" type="audio/mpeg">
                    </audio>

                    <!-- YOUR SIMPLE SWITCH -->
                    <button onclick="igniteNoise()" style="background-color: #000000; color: #FF0000; font-family: 'Times New Roman'; font-size: 20px; font-weight: bold; padding: 10px 25px; border: 4px double #FF0000; cursor: pointer;">
                        CLICK ME
                    </button>

                </td>
            </tr>
        </table>

        <br><br><br>
        <!-- RETRO VISIT COUNTER METRIC -->
        <img src="https://archive.org" alt="Counter">
        
    </center>

    <script>
        function igniteNoise() {
            var audio = document.getElementById("metaltrack");
            if (audio.paused) {
                audio.play();
            } else {
                audio.pause();
            }
        }
    </script>

</body>
</html>
