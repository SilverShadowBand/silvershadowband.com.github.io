<!DOCTYPE html>
<html>
<head>
    <title>SYSTEM LIQUEFACTION</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000000;
        }
        canvas {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        }
        /* Top return anchor positioning style */
        .terminal-anchor {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 999999; text-decoration: none;
        }
    </style>
</head>
<body>

    <!-- RETRO TERMINAL NAVIGATION LOG ENTRY -->
    <a href="index.html" class="terminal-anchor">
        <font face="Courier New, Courier, monospace" color="#FF0000" size="3">
            <b>[ RETURN TO TERMINAL CORE ]</b>
        </font>
    </a>

    <!-- Melter canvas rendering core workspace layer -->
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Map layout variables cleanly inside a raw vector matrix canvas scene
        ctx.fillStyle = "#000000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#000022";
        ctx.strokeStyle = "#FF0000";
        ctx.lineWidth = 6;
        
        const boxW = Math.min(canvas.width * 0.60, 500);
        const boxX = (canvas.width - boxW) / 2;
        ctx.fillRect(boxX, canvas.height / 2 - 60, boxW, 120);
        ctx.strokeRect(boxX, canvas.height / 2 - 60, boxW, 120);

        ctx.fillStyle = "#FF0000";
        ctx.font = "bold 42px Times New Roman";
        ctx.textAlign = "center";
        ctx.fillText("SILVER SHADOW", canvas.width / 2, canvas.height / 2 - 130);
        
        ctx.fillStyle = "#0000FF";
        ctx.font = "16px Courier New";
        ctx.fillText("::: CRITICAL CORE BREACH :::", canvas.width / 2, canvas.height / 2 + 10);

        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const columns = [];
        for (let i = 0; i < canvas.width; i += 3) {
            columns.push({ x: i, y: 0, speed: Math.random() * 6 + 3, delay: Math.random() * 20 });
        }

        function melt() {
            columns.forEach(c => {
                if (c.delay-- <= 0 && c.y < canvas.height) {
                    ctx.putImageData(imgData, 0, c.y, c.x, 0, 3, canvas.height);
                    c.y += c.speed;
                }
            });
            requestAnimationFrame(melt);
        }
        
        // Commences melt automation instantly upon redirect completion
        setTimeout(melt, 400);
    </script>
</body>
</html>
